<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Class Session - French Fluency Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/base.css' %}">
<style>
.page-wrap{
    max-width:500px;
    margin:0 auto;
    padding:160px 20px 100px;
}

.page-wrap h1{
    font-family:'Playfair Display',serif;
    color:var(--navy);
    font-size:1.9rem;
    margin-bottom:30px;
}

label{
    display:block;
    font-size:15px;
    color:#888;
    margin-bottom:6px;
}

select, input{
    width:100%;
    padding:12px 14px;
    margin-bottom:20px;
    background:#f8f8f8;
    border:1px solid #ddd;
    border-radius:10px;
    color:#333;
    font-size:16px;
    font-family:'Inter',sans-serif;
}

button{
    width:100%;
    border:none;
    border-radius:50px;
    padding:14px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(135deg,var(--blue),var(--navy));
    color:white;
}

.messages p{
    padding:14px 22px;
    border-radius:12px;
    font-weight:600;
    background:rgba(212,175,55,.15);
    color:var(--navy);
    margin-bottom:15px;
}

.messages p.success{
    background:rgba(26,156,111,.15);
    color:#1a9c6f;
}
</style>
</head>

<body>

<nav>
    <div class="logo">French <span>Fluency</span></div>
    <div class="nav-links">
        <a href="{% url 'teacher_schedule' %}">Teaching Schedule</a>
    </div>
</nav>

<div class="page-wrap">

    <h1>Add Class Session</h1>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <p class="{% if message.tags == 'success' %}success{% endif %}">{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label for="course">Course</label>
        <select name="course" id="course" required>
            {% for course in courses %}
            <option value="{{ course.id }}">{{ course.title }} ({{ course.get_level_display }})</option>
            {% endfor %}
        </select>

        <label for="start_time">Start time</label>
        <input type="datetime-local" name="start_time" id="start_time" required>

        <label for="end_time">End time</label>
        <input type="datetime-local" name="end_time" id="end_time" required>

        <label for="capacity">Capacity</label>
        <input type="number" name="capacity" id="capacity" min="1" value="1">

        <button type="submit">Add to timetable</button>
    </form>

</div>

</body>
</html>
