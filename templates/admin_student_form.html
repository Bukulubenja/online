<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student - Admin Console</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
    --navy:#0A2342;
    --gold:#D4AF37;
    --blue:#0055A4;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, sans-serif;
}

body{
    background:#FAFAFA;
    color:var(--navy);
    overflow-x:hidden;
}

.admin-shell{
    display:grid;
    grid-template-columns:260px 1fr;
    min-height:100vh;
}

.admin-sidebar{
    background:var(--navy);
    color:rgba(255,255,255,.85);
    padding:25px;
    position:sticky;
    top:0;
    height:100vh;
}

.admin-sidebar .logo{
    font-family:'Playfair Display',serif;
    font-size:20px;
    font-weight:700;
    color:#fff;
}

.admin-sidebar .logo span{
    color:var(--gold);
}

.admin-badge{
    display:inline-block;
    margin-top:8px;
    margin-bottom:30px;
    padding:4px 10px;
    border:1px solid var(--gold);
    border-radius:20px;
    color:var(--gold);
    font-size:11px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
}

.admin-nav-item{
    display:block;
    padding:12px 15px;
    margin:6px 0;
    border-radius:10px;
    color:rgba(255,255,255,.7);
    font-weight:500;
    text-decoration:none;
    transition:.3s;
}

.admin-nav-item:hover{
    background:rgba(255,255,255,.08);
    color:#fff;
    transform:translateX(5px);
}

.admin-nav-item.active{
    background:rgba(212,175,55,.15);
    color:var(--gold);
}

.admin-main{
    padding:35px;
    max-width:600px;
}

.admin-topbar{
    margin-bottom:30px;
}

.admin-topbar h1{
    font-family:'Playfair Display',serif;
    color:var(--navy);
    font-size:1.8rem;
}

.admin-topbar p{
    color:#888;
    margin-top:4px;
}

.messages p{
    padding:14px 22px;
    border-radius:12px;
    font-weight:600;
    background:rgba(212,175,55,.15);
    color:var(--navy);
    margin-bottom:15px;
}

.messages p.success{
    background:rgba(26,156,111,.15);
    color:#1a9c6f;
}

.card{
    background:white;
    border-radius:20px;
    padding:32px;
    box-shadow:0 15px 40px rgba(0,0,0,.05);
}

.form-group{
    margin-bottom:16px;
}

label{
    display:block;
    font-size:15px;
    color:#888;
    margin-bottom:6px;
}

input, select{
    width:100%;
    padding:13px 14px;
    border-radius:10px;
    border:1px solid #e0e0e0;
    outline:none;
    background:#FAFAFA;
    color:var(--navy);
    transition:.3s;
}

input:focus, select:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(0,85,164,.1);
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg, var(--blue), var(--navy));
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    margin-top:8px;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(0,85,164,.25);
}

@media(max-width:900px){
    .admin-shell{ grid-template-columns:1fr; }
    .admin-sidebar{ display:none; }
}
</style>
</head>

<body>

<div class="admin-shell">

    <div class="admin-sidebar">
        <div class="logo">French <span>Fluency</span></div>
        <div class="admin-badge">Admin Console</div>

        <a href="{% url 'admin_dashboard' %}" class="admin-nav-item">Overview</a>
        <a href="{% url 'admin_students' %}" class="admin-nav-item active">Students</a>
        <a href="{% url 'admin_instructors' %}" class="admin-nav-item">Instructors</a>
        <a href="{% url 'dashboard' %}" class="admin-nav-item">My Dashboard</a>
        <a href="{% url 'logout' %}" class="admin-nav-item">Logout</a>
    </div>

    <div class="admin-main">

        <div class="admin-topbar">
            <h1>Add Student</h1>
            <p>Create a student account manually &mdash; e.g. for an offline enrollment.</p>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <p class="{% if message.tags == 'success' %}success{% endif %}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <div class="card">
            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" name="full_name" id="full_name" value="{{ full_name|default:'' }}">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" value="{{ email|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" name="phone" id="phone" value="{{ phone|default:'' }}">
                </div>

                <div class="form-group">
                    <label for="current_level">Learning Level</label>
                    <select name="current_level" id="current_level">
                        <option value="" {% if not current_level %}selected{% endif %}>Not sure yet</option>
                        <option value="A1" {% if current_level == 'A1' %}selected{% endif %}>A1 - Beginner</option>
                        <option value="A2" {% if current_level == 'A2' %}selected{% endif %}>A2 - Elementary</option>
                        <option value="B1" {% if current_level == 'B1' %}selected{% endif %}>B1 - Intermediate</option>
                        <option value="B2" {% if current_level == 'B2' %}selected{% endif %}>B2 - Upper Intermediate</option>
                        <option value="C1" {% if current_level == 'C1' %}selected{% endif %}>C1 - Advanced</option>
                        <option value="C2" {% if current_level == 'C2' %}selected{% endif %}>C2 - Mastery</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required>
                </div>

                <button class="btn" type="submit">Create Student Account</button>
            </form>
        </div>

    </div>

</div>

</body>
</html>
