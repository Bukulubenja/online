<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ article.title }} - French Fluency Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter, sans-serif;}
body{background:#050b18;color:#fff;}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:rgba(255,255,255,0.03);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{font-family:"Playfair Display";font-size:20px;}
.logo span{color:#d4af37;}

.nav-links a{
  color:rgba(255,255,255,0.8);
  text-decoration:none;
  margin-left:25px;
  font-size:14px;
}

.nav-links a:hover{color:#d4af37;}

.container{
  max-width:800px;
  margin:0 auto;
  padding:50px 20px 80px;
}

.back-link{
  display:inline-block;
  margin-bottom:25px;
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  font-size:14px;
}

.back-link:hover{
  color:#d4af37;
}

.tag{
  display:inline-block;
  background:#d4af37;
  color:#000;
  font-weight:600;
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
  margin-bottom:15px;
  text-transform:capitalize;
}

h1{
  font-family:"Playfair Display";
  font-size:36px;
  margin-bottom:12px;
}

.meta{
  opacity:0.6;
  font-size:14px;
  margin-bottom:30px;
}

.hero-img{
  width:100%;
  height:360px;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  background-color:#0a2342;
  margin-bottom:30px;
}

.content{
  font-size:1.05rem;
  line-height:1.8;
  opacity:0.9;
  white-space:pre-line;
}
</style>
</head>

<body>

<nav>
  <div class="logo">French <span>Fluency</span></div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="{% url 'articles' %}">Articles</a>
    <a href="{% url 'courses' %}">Courses</a>
  </div>
</nav>

<div class="container">

  <a class="back-link" href="{% url 'articles' %}">&larr; Back to Articles</a>

  <div class="tag">{{ article.category }}</div>
  <h1>{{ article.title }}</h1>
  <div class="meta">{{ article.created_at|date:"F j, Y" }}</div>

  <div class="hero-img" style="background-image:url('{% if article.image %}{{ article.image.url }}{% endif %}');"></div>

  <div class="content">{{ article.content }}</div>

</div>

</body>
</html>
