<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - {{ course.title }}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/base.css' %}">
<style>
.page-wrap{
    max-width:600px;
    margin:0 auto;
    padding:160px 20px 100px;
}

.page-wrap h1{
    font-family:'Playfair Display',serif;
    color:var(--navy);
    font-size:1.9rem;
    margin-bottom:10px;
}

.summary{
    color:#888;
    margin-bottom:30px;
}

.card{
    background:#f8f8f8;
    border-radius:18px;
    padding:26px;
}

.method{
    display:block;
    padding:14px 16px;
    border-radius:10px;
    border:1px solid #e0e0e0;
    background:white;
    margin-bottom:12px;
    cursor:pointer;
    transition:.3s;
}

.method:hover{
    border-color:var(--blue);
}

.method input{
    margin-right:10px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,var(--blue),var(--navy));
    color:white;
    font-weight:600;
    cursor:pointer;
    margin-top:15px;
}

.messages p{
    padding:14px 22px;
    border-radius:12px;
    font-weight:600;
    background:rgba(239,65,53,.12);
    color:#a8281d;
    margin-bottom:15px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">French <span>Fluency</span></div>
    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'courses' %}">Courses</a>
        <a href="{% url 'my_courses' %}">My Courses</a>
    </div>
</nav>

<div class="page-wrap">

    <h1>Checkout</h1>
    <p class="summary">{{ course.title }} &mdash; ${{ course.price }}</p>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <p>{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <div class="card">
        <form method="post">
            {% csrf_token %}
            {% for value, label in methods %}
            <label class="method">
                <input type="radio" name="method" value="{{ value }}" required>{{ label }}
            </label>
            {% endfor %}

            <button class="btn" type="submit">Pay ${{ course.price }}</button>
        </form>
    </div>

</div>

</body>
</html>
