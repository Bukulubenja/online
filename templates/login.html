<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Fluency Journal - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#0A2342;
  --gold:#D4AF37;
  --blue:#0055A4;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#FAFAFA;
  position:relative;
  overflow:hidden;
}

.bg-blob{
  position:absolute;
  width:600px;
  height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,85,164,.08), transparent 70%);
  top:-200px;
  right:-150px;
}

.bg-blob.two{
  background:radial-gradient(circle, rgba(212,175,55,.10), transparent 70%);
  top:auto;
  bottom:-220px;
  left:-180px;
  right:auto;
}

.container{
  position:relative;
  z-index:2;
  width:420px;
  max-width:90%;
  padding:45px 40px;
  border-radius:24px;
  background:white;
  box-shadow:0 25px 70px rgba(10,35,66,.12);
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:22px;
  font-weight:700;
  color:var(--navy);
  margin-bottom:25px;
}

.logo span{
  color:var(--gold);
}

h1{
  color:var(--navy);
  font-size:26px;
  font-family:'Playfair Display',serif;
  margin-bottom:5px;
}

p.subtitle{
  color:#777;
  font-size:16px;
  margin-bottom:25px;
}

.messages p{
  color:#a8281d;
  font-size:15px;
  margin-bottom:8px;
  font-weight:600;
}

.input-group{
  margin-bottom:18px;
}

label{
  display:block;
  font-size:15px;
  color:#888;
  margin-bottom:6px;
}

input{
  width:100%;
  padding:14px 14px;
  border-radius:12px;
  border:1px solid #e0e0e0;
  background:#FAFAFA;
  color:var(--navy);
  outline:none;
  transition:0.3s;
}

input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(0,85,164,0.1);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--navy));
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  margin-top:10px;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 30px rgba(0,85,164,0.25);
}

.footer{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
  color:#999;
}

.footer a{
  color:var(--blue);
  text-decoration:none;
  font-weight:600;
}

.footer a:hover{
  text-decoration:underline;
}

@media(max-width:500px){
  .container{
    padding:30px 25px;
  }
}
</style>
</head>

<body>

<div class="bg-blob"></div>
<div class="bg-blob two"></div>

<div class="container">

  <div class="logo">French <span>Fluency</span></div>

  <h1>Welcome Back</h1>
  <p class="subtitle">Continue your journey to French fluency</p>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %}
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="input-group">
      <label for="username">Username or Email</label>
      <input type="text" name="username" id="username" required>
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" name="password" id="password" required>
    </div>

    <button type="submit">Sign In</button>
  </form>

  <div class="footer">
    <a href="#">Forgot password?</a>
    <a href="{% url 'register' %}">Create account</a>
  </div>

</div>

</body>
</html>
