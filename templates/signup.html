<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>French Fluency Journal - Access Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#0A2342;
  --gold:#D4AF37;
  --blue:#0055A4;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  min-height:100vh;
  background: #FAFAFA;
  color: var(--navy);
  overflow-x: hidden;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px 20px;
}

.bg-blob {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(212,175,55,.10), transparent 70%);
  border-radius: 50%;
  top: -200px;
  left: -150px;
}

.container {
  position:relative;
  z-index:2;
  max-width: 460px;
  width:100%;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:22px;
  font-weight:700;
  color:var(--navy);
  text-align:center;
  margin-bottom:20px;
}

.logo span{
  color:var(--gold);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  font-family: "Playfair Display";
  font-size: 32px;
  color:var(--navy);
}

.header p {
  color:#777;
  margin-top: 8px;
}

.messages p{
  color:#a8281d;
  text-align:center;
  font-size:15px;
  font-weight:600;
  margin-bottom:15px;
}

/* CARD */
.card {
  background: white;
  border-radius: 24px;
  padding: 36px;
  box-shadow: 0 25px 70px rgba(10,35,66,.1);
}

.card h2{
  font-family:'Playfair Display',serif;
  color:var(--navy);
  font-size:20px;
  margin-bottom:20px;
}

/* FORM */
.form-group {
  margin-bottom: 16px;
}

label{
  display:block;
  font-size:15px;
  color:#888;
  margin-bottom:6px;
}

input, select {
  width: 100%;
  padding: 13px 14px;
  border-radius: 10px;
  border: 1px solid #e0e0e0;
  outline: none;
  background: #FAFAFA;
  color: var(--navy);
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,85,164,0.1);
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--blue), var(--navy));
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 8px;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(0,85,164,0.25);
}

@media(max-width:520px){
  .card { padding: 26px 22px; }
}
</style>
</head>

<body>

<div class="bg-blob"></div>

<div class="container">

  <div class="logo">French <span>Fluency</span></div>

  <div class="header">
    <h1>Create Account</h1>
    <p>Start your journey to French fluency</p>
  </div>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %}
  </div>
  {% endif %}

  <div class="card">

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label for="full_name">Full Name</label>
        <input type="text" name="full_name" id="full_name" value="{{ full_name|default:'' }}">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" value="{{ email|default:'' }}" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" name="phone" id="phone" value="{{ phone|default:'' }}">
      </div>

      <div class="form-group">
        <label for="current_level">Learning Level</label>
        <select name="current_level" id="current_level">
          <option value="" {% if not current_level %}selected{% endif %}>Not sure yet</option>
          <option value="A1" {% if current_level == 'A1' %}selected{% endif %}>A1 - Beginner</option>
          <option value="A2" {% if current_level == 'A2' %}selected{% endif %}>A2 - Elementary</option>
          <option value="B1" {% if current_level == 'B1' %}selected{% endif %}>B1 - Intermediate</option>
          <option value="B2" {% if current_level == 'B2' %}selected{% endif %}>B2 - Upper Intermediate</option>
          <option value="C1" {% if current_level == 'C1' %}selected{% endif %}>C1 - Advanced</option>
          <option value="C2" {% if current_level == 'C2' %}selected{% endif %}>C2 - Mastery</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" required>
      </div>

      <button class="btn" type="submit">Create Account</button>
    </form>
  </div>

</div>

</body>
</html>
